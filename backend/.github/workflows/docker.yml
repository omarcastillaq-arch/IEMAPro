# ==============================================================================
# Horizon Medical WSS - Docker Build Pipeline
# ==============================================================================
# Builds and optionally pushes Docker images on push to main/develop and tags.
# Validates Dockerfile correctness and runs container health checks.
# ==============================================================================

name: Docker Build & Push

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Job 1: Docker Build & Validate
  # ============================================================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: hrzmed-wss:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏥 Container health check
        run: |
          echo "Starting container for health check..."
          docker run -d \
            --name hrzmed-test \
            -p 3000:3000 \
            -e NODE_ENV=test \
            -e AUTH_ENABLED=false \
            -e JWT_SECRET=docker-test-secret \
            -e LOG_LEVEL=error \
            hrzmed-wss:test

          echo "Waiting for server to start..."
          sleep 5

          echo "Checking health endpoint..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
          echo "Health check status: $HTTP_STATUS"

          docker logs hrzmed-test

          docker stop hrzmed-test
          docker rm hrzmed-test

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed with status: $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Health check passed!"

      - name: 📤 Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Job 2: Docker Compose Validation
  # ============================================================================
  docker-compose-validate:
    name: 🐳 Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Validate docker-compose.yml
        run: docker compose config --quiet

      - name: 🔍 Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
